<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Калькулятор</h1>
    <input type="text" id="inp_res" placeholder="0" readonly>

    <div class="buttons">
        <input type="button" value="C" id="btn_clear" class="double">
        <input type="button" value="/" id="btn_divide">
        <input type="button" value="*" id="btn_multiply">

        <input type="button" value="7" id="btn_7">
        <input type="button" value="8" id="btn_8">
        <input type="button" value="9" id="btn_9">
        <input type="button" value="-" id="btn_minus">

        <input type="button" value="4" id="btn_4">
        <input type="button" value="5" id="btn_5">
        <input type="button" value="6" id="btn_6">
        <input type="button" value="+" id="btn_plus">

        <input type="button" value="1" id="btn_1">
        <input type="button" value="2" id="btn_2">
        <input type="button" value="3" id="btn_3">
        <input type="button" value="=" id="btn_equal" class="tall">
        <input type="button" value="0" id="btn_0" class="double">
        <input type="button" value="." id="btn_dot">

        
    </div>
</body>
