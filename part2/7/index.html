<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox — 5 задач</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ========== ЗАДАЧА 1: МЕНЮ ========== -->
    <div class="task-1">
        <div class="logo">Логотип</div>
        <div class="nav-links">
            <a href="#">Главная</a>
            <a href="#">Услуги</a>
            <a href="#">Проекты</a>
            <a href="#">Блог</a>
            <a href="#">Контакты</a>
        </div>
        <button>Вход</button>
    </div>

    <!-- ========== ЗАДАЧА 2: ЦЕНТРИРОВАНИЕ ========== -->
    <div class="task-2">
        <div class="centered-block">
            <h1>Заголовок</h1>
            <p>Текст внутри блока</p>
            <button>Кнопка</button>
        </div>
    </div>

    <!-- ========== ЗАДАЧА 3: СЕТКА КАРТОЧЕК ========== -->
    <div class="task-3">
        <div class="card">1</div>
        <div class="card">2</div>
        <div class="card">3</div>
        <div class="card">4</div>
        <div class="card">5</div>
        <div class="card">6</div>
        <div class="card">7</div>
        <div class="card">8</div>
        <div class="card">9</div>
        <div class="card">10</div>
    </div>

    <!-- ========== ЗАДАЧА 4: КОМАНДА ========== -->
    <div class="task-4">
        <h2>Наша команда</h2>
        <div class="team-grid">
            <div class="team-card">
                <div>📷</div>
                <div><b>Анна</b></div>
                <div>Дизайнер</div>
                <button>Подробнее</button>
            </div>
            <div class="team-card">
                <div>📷</div>
                <div><b>Борис</b></div>
                <div>Разработчик</div>
                <button>Подробнее</button>
            </div>
            <div class="team-card">
                <div>📷</div>
                <div><b>Вика</b></div>
                <div>Менеджер</div>
                <button>Подробнее</button>
            </div>
            <div class="team-card">
                <div>📷</div>
                <div><b>Глеб</b></div>
                <div>Аналитик</div>
                <button>Подробнее</button>
            </div>
            <div class="team-card">
                <div>📷</div>
                <div><b>Дина</b></div>
                <div>Маркетолог</div>
                <button>Подробнее</button>
            </div>
            <div class="team-card">
                <div>📷</div>
                <div><b>Егор</b></div>
                <div>Тестировщик</div>
                <button>Подробнее</button>
            </div>
        </div>
    </div>

    <!-- ========== ЗАДАЧА 5: ПАНЕЛЬ ДЕЙСТВИЙ ========== -->
    <div class="task-5">
        <h3>Заголовок</h3>
        <div class="buttons">
            <button>Отмена</button>
            <button class="primary">Сохранить</button>
            <button>Удалить</button>
        </div>
    </div>

</body>
</html>
