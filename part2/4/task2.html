<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма фильтра каталога</title>
    
</head>
<body>
    <h1>Фильтр каталога</h1>
    <form action="#" method="get">

        <div>
            <label for="search">Поиск:</label>
            <input type="text" id="search" name="search" placeholder="Введите название товара или ключевые слова">
        </div>


        <div>
            <label for="category">Категория:</label>
            <select id="category" name="category">
                <option value="">Все категории</option>
                <option value="electronics">Электроника</option>
                <option value="clothing">Одежда и обувь</option>
                <option value="books">Книги</option>
                <option value="furniture">Мебель</option>
                <option value="sports">Спорт и отдых</option>
            </select>
        </div>


        <div>
            <label for="sort">Сортировка:</label>
            <select id="sort" name="sort">
                <option value="default">По умолчанию</option>
                <option value="price_asc">Цена по возрастанию</option>
                <option value="price_desc">Цена по убыванию</option>
                <option value="name_asc">Название (А-Я)</option>
                <option value="name_desc">Название (Я-А)</option>
                <option value="newest">Сначала новинки</option>
            </select>
        </div>

        <fieldset>
            <legend>Диапазон цены (₽)</legend>
            <label for="price_min">от</label>
            <input type="number" id="price_min" name="price_min" step="1" placeholder="0">
            <label for="price_max">до</label>
            <input type="number" id="price_max" name="price_max" step="1" placeholder="100000">
        </fieldset>


        <fieldset>
            <legend>Дополнительные опции</legend>
            <label>
                <input type="checkbox" name="free_shipping" value="1">
                Бесплатная доставка
            </label>
            <br>
            <label>
                <input type="checkbox" name="in_stock" value="1">
                Только в наличии
            </label>
            <br>
            <label>
                <input type="checkbox" name="discount" value="1">
                Со скидкой
            </label>
            <br>
            <label>
                <input type="checkbox" name="new_arrivals" value="1">
                Новинки
            </label>
        </fieldset>


        <fieldset>
            <legend>Состояние товара</legend>
            <label>
                <input type="radio" name="condition" value="new">
                Новый
            </label>
            <br>
            <label>
                <input type="radio" name="condition" value="used">
                Б/У
            </label>
            <br>
            <label>
                <input type="radio" name="condition" value="refurbished">
                Восстановленный
            </label>
        </fieldset>


        <div>
            <button type="submit">Применить</button>
            <button type="reset">Сбросить</button>
        </div>
    </form>
</body>
</html>
