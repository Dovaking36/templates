<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма обратной связи</title>

</head>
<body>
    <h1>Форма обратной связи</h1>
    <form action="#" method="post" enctype="multipart/form-data">

        <div>
            <label for="name">Имя:</label>
            <input type="text" id="name" name="name" required placeholder="Введите ваше имя">
        </div>


        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@domain.com">
        </div>


        <div>
            <label for="subject">Тема:</label>
            <input type="text" id="subject" name="subject" required placeholder="Кратко опишите тему обращения">
        </div>


        <div>
            <label for="message">Сообщение:</label>
            <textarea id="message" name="message" rows="5" cols="40" required placeholder="Подробно изложите ваш вопрос или предложение..."></textarea>
        </div>


        <fieldset>
            <legend>Приоритет обращения</legend>
            <label>
                <input type="radio" name="priority" value="low" checked> Низкий
            </label>
            <br>
            <label>
                <input type="radio" name="priority" value="medium"> Средний
            </label>
            <br>
            <label>
                <input type="radio" name="priority" value="high"> Высокий
            </label>
            <br>
            <label>
                <input type="radio" name="priority" value="critical"> Критический
            </label>
        </fieldset>


        <div>
            <label for="attachment">Прикрепить файл:</label>
            <input type="file" id="attachment" name="attachment">
        </div>


        <div>
            <button type="submit">Отправить</button>
        </div>
    </form>
</body>
</html>
