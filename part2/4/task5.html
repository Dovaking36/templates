<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анкета — развёрнутая форма</title>
</head>
<body>
    <h1>Анкета участника</h1>
    <form action="#" method="post" enctype="multipart/form-data">

        <fieldset>
            <legend>Личные данные</legend>

            <div>
                <label for="first_name">Имя *:</label>
                <input type="text" id="first_name" name="first_name" required placeholder="Введите имя">
            </div>

            <div>
                <label for="last_name">Фамилия:</label>
                <input type="text" id="last_name" name="last_name" placeholder="Введите фамилию">
            </div>

            <div>
                <label for="birthdate">Дата рождения:</label>
                <input type="date" id="birthdate" name="birthdate">
            </div>

            <div>
                <span>Пол:</span>
                <label>
                    <input type="radio" name="gender" value="male"> Мужской
                </label>
                <label>
                    <input type="radio" name="gender" value="female"> Женский
                </label>
            </div>

            <div>
                <label for="age">Возраст (лет):</label>
                <input type="number" id="age" name="age" min="0" max="120" step="1">
            </div>
        </fieldset>


        <fieldset>
            <legend>Контакты</legend>

            <div>
                <label for="email">Email *:</label>
                <input type="email" id="email" name="email" required placeholder="example@domain.com">
            </div>

            <div>
                <label for="phone">Телефон:</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (123) 456-78-90">
            </div>

            <div>
                <label for="city">Город:</label>
                <input type="text" id="city" name="city" placeholder="Ваш город">
            </div>
        </fieldset>


        <fieldset>
            <legend>Предпочтения</legend>

            <div>
                <label for="fav_color">Любимый цвет:</label>
                <input type="color" id="fav_color" name="fav_color" value="#3a6ea5">
            </div>

            <div>
                <label for="experience">Уровень опыта (0 — новичок, 100 — эксперт):</label>
                <input type="range" id="experience" name="experience" min="0" max="100" step="1" value="50">
                <span>50 (должно меняться через js)</span> 
            </div>

            <div>
                <label>
                    <input type="checkbox" name="newsletter" value="yes">
                    Получать новости и анонсы
                </label>
            </div>

            <div>
                <span>Предпочитаемый способ связи:</span>
                <label>
                    <input type="radio" name="contact_method" value="email"> Email
                </label>
                <label>
                    <input type="radio" name="contact_method" value="phone"> Телефон
                </label>
            </div>

            <div>
                <label for="comments">Дополнительные пожелания / комментарии:</label><br>
                <textarea id="comments" name="comments" rows="3" cols="40" placeholder="Расскажите о ваших ожиданиях или вопросах..."></textarea>
            </div>
        </fieldset>


        <fieldset>
            <legend>Дополнительная информация</legend>

            <div>
                <label for="attachment">Прикрепить файл (фото, резюме):</label>
                <input type="file" id="attachment" name="attachment">
            </div>

            <div>
                <label for="contact_time">Удобное время для связи:</label>
                <input type="time" id="contact_time" name="contact_time">
            </div>
        </fieldset>

    
        <div>
            <button type="submit">Отправить анкету</button>
        </div>
    </form>
    <p><small>Поля, отмеченные *, обязательны для заполнения.</small></p>
</body>
</html>
